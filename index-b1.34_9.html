function inField(wx,wy){
  if(wy<FT||wy>FB||wx<0||wx>FIELD_W)return false;
  if(wx>FIELD_W-CORNER_R){const cx=FIELD_W-CORNER_R;if(wy<FT+CORNER_R)return(wx-cx)**2+(wy-(FT+CORNER_R))**2<=CORNER_R**2;if(wy>FB-CORNER_R)return(wx-cx)**2+(wy-(FB-CORNER_R))**2<=CORNER_R**2;}
  if(wx<CORNER_R){const cx=CORNER_R;if(wy<FT+CORNER_R)return(wx-cx)**2+(wy-(FT+CORNER_R))**2<=CORNER_R**2;if(wy>FB-CORNER_R)return(wx-cx)**2+(wy-(FB-CORNER_R))**2<=CORNER_R**2;}
  return true;
}
function ovalWorld(ctx){ctx.beginPath();ctx.moveTo(CORNER_R,FT);ctx.lineTo(FIELD_W-CORNER_R,FT);ctx.arc(FIELD_W-CORNER_R,FT+CORNER_R,CORNER_R,-Math.PI/2,0);ctx.lineTo(FIELD_W,FB-CORNER_R);ctx.arc(FIELD_W-CORNER_R,FB-CORNER_R,CORNER_R,0,Math.PI/2);ctx.lineTo(CORNER_R,FB);ctx.arc(CORNER_R,FB-CORNER_R,CORNER_R,Math.PI/2,Math.PI);ctx.lineTo(0,FT+CORNER_R);ctx.arc(CORNER_R,FT+CORNER_R,CORNER_R,Math.PI,Math.PI*1.5);ctx.closePath();}
function ballAt(b){const t=b.t;return{x:b.x0+(b.x1-b.x0)*t,y:b.y0+(b.y1-b.y0)*t-b.h*4*t*(1-t)};}
function hitBtn(p,b){return p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h;}
function mkRand(s){s=s>>>0;return()=>{s=Math.imul(s^(s>>>16),0x45d9f3b);s=Math.imul(s^(s>>>16),0x45d9f3b);s^=s>>>16;return(s>>>0)/4294967296;};}
function clampCam(c){return Math.max(0,Math.min(FIELD_W-W,c));}
function colorDistance(h1,h2){const p=h=>{const v=parseInt(h.replace('#',''),16);return[(v>>16)&255,(v>>8)&255,v&255];};const[r1,g1,b1]=p(h1),[r2,g2,b2]=p(h2);return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);}
function hexToRgb(h){const v=parseInt(h.replace('#',''),16);return[(v>>16)&255,(v>>8)&255,v&255];}
function calcDir(vx,vy){
  if(Math.abs(vx)<0.5&&Math.abs(vy)<0.5)return 'D';
  const a=Math.atan2(vy,vx)*180/Math.PI;
  if(a>-22.5&&a<=22.5)return 'R';
  if(a>22.5&&a<=67.5)return 'DR';
  if(a>67.5&&a<=112.5)return 'D';
  if(a>112.5&&a<=157.5)return 'DL';
  if(a>157.5||a<=-157.5)return 'L';
  if(a>-157.5&&a<=-112.5)return 'UL';
  if(a>-112.5&&a<=-67.5)return 'U';
  return 'UR';
}

function makeSfx(soundRef){
  let ac=null;
  const go=()=>{try{if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();}if(ac.state==='suspended')ac.resume();return ac;}catch(e){return null;}};
  const t=(f,d,type,v,delay)=>{if(soundRef&&!soundRef.current)return;const a=go();if(!a)return;const when=a.currentTime+(delay||0)/1000;const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=type||'square';o.frequency.value=f;g.gain.setValueAtTime(v||0.22,when);g.gain.exponentialRampToValueAtTime(0.001,when+d);o.start(when);o.stop(when+d);};
  const _BASE='https://cdn.jsdelivr.net/gh/jakenudge/kickmark-assets/';
  const _mp3=(file)=>{if(soundRef&&!soundRef.current)return;try{const a=new Audio(_BASE+file);a.volume=0.8;a.play().catch(()=>{});}catch(e){}};
  return{
    kick:()=>t(130,0.08,'sine',0.4),
    mark:()=>{t(440,0.07,'square',0.2);t(660,0.09,'square',0.2,65);},
    goal:()=>_mp3('crowd-cheer-1.mp3'),
    behind:()=>{t(330,0.08,'square',0.2);t(240,0.1,'square',0.2,80);},
    tackle:()=>t(90,0.14,'sine',0.4),
    intercept:()=>{t(200,0.07,'square',0.22);t(160,0.1,'square',0.22,70);},
    siren:()=>_mp3('siren-1.mp3'),
    whistle:()=>_mp3('whistle-2.mp3'),
    init:()=>go(),
  };
}

function AFLGame(){
  const [homeTeam,setHomeTeam]=useState(null);const [awayTeam,setAwayTeam]=useState(null);
  const [qLen,setQLenState]=useState(120);const [gameStarted,setGameStarted]=useState(false);
  const [showSplash,setShowSplash]=useState(true);
  const [soundEnabled,setSoundEnabled]=useState(true);
  const soundEnabledRef=useRef(true);
  soundEnabledRef.current=soundEnabled;
  const crowd=useMemo(()=>{
    const rng=mkRand(8421),pal=["#c17f3e","#8b4513","#d2691e","#4682b4","#cc3333","#556b2f","#b8860b","#708090","#3355aa","#a05020","#2f4f4f","#cc6633","#446699","#884400"],out=[];
    for(let xi=0;xi<W;xi+=7)for(let row=0;row<5;row++)if(rng()>0.18)out.push({x:xi+rng()*3,y:4+row*6+rng()*2,c:pal[Math.floor(rng()*pal.length)],h:4+Math.floor(rng()*2)});
    return out;
  },[]);
  const cvRef=useRef(null),rafRef=useRef(null),sfxRef=useRef(null),spriteSheetsRef=useRef({home:null,away:null});
  const g=useRef({phase:P.COUNT,countdown:COUNTDOWN,kicker:{x:80*PPM,y:FM,variant:0},mark:{x:90*PPM,y:FM,variant:1},leads:[],defenders:[],ds:null,dc:null,ball:null,walkT:0,markRushing:false,msg:'',msgTimer:0,_afterResult:null,
    shotPhase:'power',shotPower:0,shotPowerDir:1,shotPowerSpeed:1.4,shotPowerLocked:0,shotAim:0.5,shotAimDir:1,shotAimSpeed:0.5,shotDistT:0,
    ballUpLines:[],ballUpLineIdx:0,ballUpLineTimer:0,ballUpHomeWins:true,ballUpTimer:0,ballUpIsCentreBounce:false,attackingRight:true,oppKicker:null,oppLeads:[],oppDefenders:[],oppPhase:null,oppCountdown:0,oppOutcome:null,oppFromDanger:false,oppMsg:'',oppMsgTimer:0,oppSequence:[],oppSeqIdx:0,oppTurnoverX:null,oppTurnoverY:null,oppMark:null,
    hG:0,hB:0,aG:0,aB:0,quarter:1,clockSec:120,nextKicker:null,nextMark:null,homeTeam:null,awayTeam:null,homeSpeedMult:1,awaySpeedMult:1,
    camX:clampCam(75*PPM),camTarget:clampCam(75*PPM),
    hitPause:0,shake:0,shakeOx:0,shakeOy:0,catchAnim:null,floats:[],confetti:[],
  });

  useEffect(()=>{
    if(!gameStarted||!homeTeam)return;
    const cv=cvRef.current;if(!cv)return;
    const ctx=cv.getContext("2d"),gm=g.current;
    gm.homeTeam=homeTeam;gm.awayTeam=awayTeam;gm.clockSec=qLen;
    gm.hG=0;gm.hB=0;gm.aG=0;gm.aB=0;gm.quarter=1;
    gm.phase=P.COUNT;gm.countdown=COUNTDOWN;gm.msg='';gm.msgTimer=0;
    gm.ball=null;gm.ds=null;gm.dc=null;gm.markRushing=false;
    gm.leads=[];gm.defenders=[];gm.confetti=[];gm.floats=[];
    gm.catchAnim=null;gm.shake=0;gm.shakeOx=0;gm.shakeOy=0;gm.hitPause=0;
    gm.ballUpLines=[];gm.ballUpLineIdx=0;gm.ballUpLineTimer=0;
    gm._afterResult=null;gm.attackingRight=true;gm.oppKicker=null;gm.oppLeads=[];gm.oppDefenders=[];gm.oppPhase=null;gm.oppOutcome=null;gm.oppFromDanger=false;gm.oppMsg='';gm.oppMsgTimer=0;gm.oppSequence=[];gm.oppSeqIdx=0;gm.oppTurnoverX=null;gm.oppTurnoverY=null;gm.oppMark=null;
    gm.kicker={x:80*PPM,y:FM,variant:0};gm.mark={x:90*PPM,y:FM,variant:1};
    gm.nextKicker=null;gm.nextMark=null;
    gm.camX=clampCam(75*PPM);gm.camTarget=clampCam(75*PPM);
    gm.awayClash=colorDistance(homeTeam.c1,awayTeam.c1)<85;
    (()=>{
      const _ss=spriteSheetsRef.current;
      const _img=new Image();
      _img.crossOrigin='anonymous';
      _img.onerror=(e)=>{ console.error('sprite image failed to load', e); };
      _img.onload=()=>{
        console.log('sprite image loaded, size:', _img.width, 'x', _img.height);
        ['home','away'].forEach(side=>{
          const team=side==='home'?homeTeam:awayTeam;
          if(!team)return;
          const kit=TEAM_KITS[team.id]||{j:team.c1,sh:team.c2,sk:team.c1};
          const[jr,jg,jb]=hexToRgb(kit.j);
          const[sr,sg,sb]=hexToRgb(kit.sh);
          const[skr,skg,skb]=hexToRgb(kit.sk);
          const _oc=document.createElement('canvas');
          _oc.width=_img.width;_oc.height=_img.height;
          const _ox=_oc.getContext('2d','willReadFrequently');
          _ox.drawImage(_img,0,0);
          try{
            const id=_ox.getImageData(0,0,_oc.width,_oc.height);
            const d=id.data;
            for(let i=0;i<d.length;i+=4){
              const r=d[i],g=d[i+1],b=d[i+2];
              // Chroma key: green background
              if(g>180&&g>r*2&&g>b*2){d[i+3]=0;continue;}
              // Red zone → jumper
              if(r>150&&r>g*3&&r>b*3){

      if(winner)ctx.fillStyle="#44ee44",ctx.fillText(`${winner.name.toUpperCase()} WIN`,W/2,FM+80);
      else ctx.fillStyle="#ffcc00",ctx.fillText("DRAW",W/2,FM+80);
      ctx.font='11px "Courier New",Courier,monospace';ctx.fillStyle="rgba(255,255,255,0.35)";ctx.fillText("TAP TO RETURN TO MENU",W/2,FM+96);
      ctx.textBaseline="alphabetic";
    }

    function drawQEnd(){
      const ht=gm.homeTeam,at=gm.awayTeam,hT=gm.hG*6+gm.hB,aT=gm.aG*6+gm.aB;
      const PW=480,PH=250,PX=Math.round(W/2-PW/2),PY=Math.round(FM-PH/2);
      // Drop shadow
      ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(PX+4,PY+4,PW,PH);
      // White panel
      ctx.fillStyle='#ffffff';ctx.fillRect(PX,PY,PW,PH);
      ctx.strokeStyle='#dddddd';ctx.lineWidth=1;ctx.setLineDash([]);ctx.strokeRect(PX,PY,PW,PH);
      // Header
      ctx.font='bold 15px Arial,sans-serif';ctx.fillStyle='#cc0000';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(`END OF QUARTER ${gm.quarter}`,W/2,PY+20);
      // Divider
      ctx.fillStyle='#eeeeee';ctx.fillRect(PX+16,PY+36,PW-32,1);
      // Team boxes
      const BW=Math.round(PW/2-24),BH=130,BY=PY+46;
      const BX0=PX+16,BX1=Math.round(W/2)+8;
      [[ht,gm.hG,gm.hB,hT],[at,gm.aG,gm.aB,aT]].forEach(([team,g,b,tot],i)=>{
        const bx=i===0?BX0:BX1,c1=team?team.c1:'#444444';
        ctx.fillStyle='#f7f7f7';ctx.fillRect(bx,BY,BW,BH);
        ctx.fillStyle=c1;ctx.fillRect(bx,BY,BW,7);
        ctx.font='bold 12px Arial,sans-serif';ctx.fillStyle='#111111';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(team?team.name.toUpperCase():'TEAM',bx+BW/2,BY+28);
        ctx.font='bold 36px Arial,sans-serif';ctx.fillStyle='#cc0000';
        ctx.fillText(`${g}.${b}.${tot}`,bx+BW/2,BY+88);
      });
      // CTA button
      const BTY=PY+PH-46,BTH=34,BTW=PW-32,BTX=PX+16;
      ctx.fillStyle='#cc0000';ctx.fillRect(BTX,BTY,BTW,BTH);
      ctx.font='bold 13px Arial,sans-serif';ctx.fillStyle='#ffffff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(`TAP TO START QUARTER ${gm.quarter+1}`,W/2,BTY+BTH/2);
      ctx.textBaseline='alphabetic';
    }

    let lastTs=null;
    function loop(ts){
      rafRef.current=requestAnimationFrame(loop);
      const dt=Math.min((ts-(lastTs||ts))/1000,0.05);lastTs=ts;
      gm.walkT+=dt;

      if(gm.hitPause>0){
        gm.hitPause-=dt;
        ctx.save();
        if(gm.shakeOx||gm.shakeOy)ctx.translate(gm.shakeOx,gm.shakeOy);
        drawBg();drawWorld();
        if(gm.phase===P.CHOICE)drawChoice();
        if(gm.phase===P.SHOT)drawShotBar();
        if(gm.phase===P.BALL_UP)drawBallUp();
        if(gm.phase===P.OPP_SIM)drawOppSim();
        if(gm.phase===P.QEND)drawQEnd();
      if(gm.phase===P.GAMEOVER)drawGameOver();
        drawMsg();drawCountdown();drawHUD();drawRestartBtn();
        ctx.restore();
        
        return;
      }

      if(gm.shake>0){
        gm.shake-=dt*4;const sh=Math.max(0,gm.shake);
        gm.shakeOx=(Math.random()-0.5)*sh*6;gm.shakeOy=(Math.random()-0.5)*sh*4;
      }else{gm.shakeOx=0;gm.shakeOy=0;}

      gm.camX+=(gm.camTarget-gm.camX)*Math.min(1,CAM_EASE*dt);

      gm.floats.forEach(f=>{f.age+=dt;f.wy+=f.vy*dt;});gm.floats=gm.floats.filter(f=>f.age<f.maxAge);
      gm.confetti.forEach(p=>{p.age+=dt;p.wx+=p.vx*dt;p.y+=p.vy*dt;p.vy+=60*dt;});gm.confetti=gm.confetti.filter(p=>p.age<p.maxAge);
      if(gm.catchAnim){gm.catchAnim.t-=dt;if(gm.catchAnim.t<=0)gm.catchAnim=null;}

      if(gm.phase===P.SHOT){
        if(gm.shotPhase==='power'){gm.shotPower+=gm.shotPowerDir*gm.shotPowerSpeed*dt;if(gm.shotPower>=1){gm.shotPower=1;gm.shotPowerDir=-1;}else if(gm.shotPower<=0){gm.shotPower=0;gm.shotPowerDir=1;}}
        else{gm.shotAim+=gm.shotAimDir*gm.shotAimSpeed*dt;if(gm.shotAim>=1){gm.shotAim=1;gm.shotAimDir=-1;}else if(gm.shotAim<=0){gm.shotAim=0;gm.shotAimDir=1;}}
      }

      if(gm.phase===P.BALL_UP){
        gm.ballUpTimer-=dt;
        gm.ballUpLineTimer-=dt;
        if(gm.ballUpLineTimer<=0&&gm.ballUpLineIdx<gm.ballUpLines.length){gm.ballUpLineIdx++;gm.ballUpLineTimer=1.0;}
        if(gm.ballUpTimer<=0){if(gm.ballUpHomeWins){resetPlay();}else{if(gm._ballUpCallback)gm._ballUpCallback();else startOppSim(false);}}
      }

      if(gm.phase===P.OPP_SIM){
        if(gm.oppPhase==='play'){moveOppLeads(dt);moveOppDefenders(dt);gm.oppCountdown-=dt;if(gm.oppCountdown<=0)execOppKick();gm.camTarget=gm.attackingRight?clampCam(gm.oppKicker.x-W+5*PPM):clampCam(gm.oppKicker.x-5*PPM);}
        else if(gm.oppPhase==='fly'&&gm.ball){gm.ball.t+=dt/gm.ball.dur;gm.camTarget=clampCam(ballAt(gm.ball).x-W/2);convergeOppAll(dt);if(gm.ball.t>=1){gm.ball.t=1;resolveOppPlay();}}
        else if(gm.oppPhase==='result'){gm.oppMsgTimer-=dt;if(gm.oppMsgTimer<=0)executeOppOutcome();}
      }

      if(gm.phase===P.RESULT){
        gm.msgTimer-=dt;if(gm.msgTimer<=0){const cb=gm._afterResult;gm._afterResult=null;if(cb)cb();else resetPlay();}
      }

      if((gm.phase===P.COUNT||gm.phase===P.DRAG||gm.phase===P.FLY)){
        if(gm.phase===P.COUNT||gm.phase===P.DRAG){
          gm.countdown-=dt;
          if(gm.countdown<=0){sfx.tackle();gm.msg='TACKLED — BALL UP';gm.msgTimer=1.0;gm.phase=P.RESULT;gm._afterResult=()=>startBallUp();gm.countdown=0;}
          else if(gm.countdown<=RUSH_START&&!gm.markRushing){gm.markRushing=true;}
          if(gm.markRushing){const dx=gm.kicker.x-gm.mark.x,dy=gm.kicker.y-gm.mark.y,d=Math.hypot(dx,dy);if(d>4){const rmvx=(dx/d)*RUSH_SPEED,rmvy=(dy/d)*RUSH_SPEED;gm.mark.x+=rmvx*dt;gm.mark.y+=rmvy*dt;gm.mark.vx=rmvx;gm.mark.vy=rmvy;gm.mark.dir=calcDir(dx,dy);}else{gm.mark.vx=0;gm.mark.vy=0;sfx.tackle();gm.msg='TACKLED — BALL UP';gm.msgTimer=1.0;gm.phase=P.RESULT;gm._afterResult=()=>startBallUp();}}
          moveLeads(dt);moveDefenders(dt);
        }
        if((gm.phase===P.FLY||(gm.phase===P.OPP_SIM&&gm.oppPhase==='fly'))&&gm.ball){
          gm.ball.t+=dt/gm.ball.dur;
          gm.camTarget=clampCam(ballAt(gm.ball).x-W/2);
          convergeAll(dt);
          if(gm.ball.t>=1){gm.ball.t=1;checkMark();}
        }
      }

      if(!gm.clockPaused&&[P.COUNT,P.DRAG,P.FLY,P.RESULT,P.CHOICE,P.OPP_SIM].includes(gm.phase)){
        gm.clockSec-=dt;
        if(gm.clockSec<=0){
          gm.clockSec=0;sfx.siren();
          if(gm.quarter>=4){gm.msg='FINAL SIREN';gm.msgTimer=0.5;gm.phase=P.GAMEOVER;}
          else{gm.phase=P.QEND;}
        }
      }

      ctx.save();
      if(gm.shakeOx||gm.shakeOy)ctx.translate(gm.shakeOx,gm.shakeOy);
      drawBg();drawWorld();
      if(gm.phase===P.CHOICE)drawChoice();
      if(gm.phase===P.SHOT)drawShotBar();
      if(gm.phase===P.BALL_UP)drawBallUp();
      if(gm.phase===P.OPP_SIM)drawOppSim();
      if(gm.phase===P.QEND)drawQEnd();
      if(gm.phase===P.GAMEOVER)drawGameOver();
      drawMsg();drawCountdown();drawHUD();drawRestartBtn();
      ctx.restore();
      
    }

    rafRef.current=requestAnimationFrame(loop);
    return()=>{
      cancelAnimationFrame(rafRef.current);
      _bgAudio.pause();_bgAudio.currentTime=0;_bgAudio2.pause();_bgAudio2.currentTime=0;
      cv.removeEventListener("mousedown",onDown);cv.removeEventListener("mousemove",onMove);cv.removeEventListener("mouseup",onUp);
      cv.removeEventListener("touchstart",onDown);cv.removeEventListener("touchmove",onMove);cv.removeEventListener("touchend",onUp);
    };
  },[gameStarted,homeTeam,awayTeam,qLen,crowd]);

  if(showSplash)return <StartScreen onStart={()=>setShowSplash(false)}/>;
  if(!gameStarted||!homeTeam){
    return <TeamSelect soundEnabled={soundEnabled} onSoundChange={setSoundEnabled} onSelect={(t,ql)=>{
      const opp=TEAMS.filter(x=>x.id!==t.id);
      const at=opp[Math.floor(Math.random()*opp.length)];
      setHomeTeam(t);setAwayTeam(at);setQLenState(ql);setGameStarted(true);
    }}/>;
  }
  return(
    <div style={{background:'#000',display:'flex',justifyContent:'center',alignItems:'center',minHeight:'100vh'}}>
      <canvas ref={cvRef} width={W} height={H} style={{display:'block',maxWidth:'100%',imageRendering:'pixelated',cursor:'crosshair'}}/>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<AFLGame />);
  </script>
</body>
</html>
